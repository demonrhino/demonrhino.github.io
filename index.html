<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUT UP MUM</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            overflow: hidden;
        }

        .flip-container {
            width: 80vmin;
            height: 80vmin;
            perspective: 1000px;
            position: relative;
        }

        .flipper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flipper.flipped {
            transform: rotateY(180deg);
        }

        .front, .back {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .front {
            z-index: 2;
            transform: rotateY(0deg);
            cursor: pointer;
        }

        .front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .back {
            transform: rotateY(180deg);
            background: transparent;
            position: relative;
            cursor: pointer;
        }

        .back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .bum-text {
            position: absolute;
            z-index: 2;
            color: #2a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: clamp(0.9rem, 3vmin, 1.6rem);
            font-weight: 800;
            text-align: center;
            line-height: 1.5;
            /* Start hidden inside the crack */
            top: 58%;
            left: 50%;
            transform: translateX(-50%) translateY(40px) scale(0.3);
            opacity: 0;
            text-shadow: 
                0 0 3px rgba(255,255,255,0.8),
                0 0 6px rgba(255,255,255,0.5),
                0 1px 2px rgba(0,0,0,0.4);
            white-space: nowrap;
            pointer-events: none;
        }

        .bum-text.animate {
            animation: squeezeOut 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes squeezeOut {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(40px) scale(0.3);
            }
            30% {
                opacity: 0.6;
                transform: translateX(-50%) translateY(25px) scale(0.5);
            }
            60% {
                opacity: 1;
                transform: translateX(-50%) translateY(5px) scale(0.9);
            }
            80% {
                transform: translateX(-50%) translateY(-5px) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        .hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-family: sans-serif;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .flip-container:hover .hint {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="flip-container" id="flipContainer">
        <div class="flipper" id="flipper">
            <div class="front" id="front">
                <img src="potatoooooo.png" alt="potatoooooo">
            </div>
            <div class="back" id="back">
                <img src="potatoass.png" alt="potato's ass crack, lovely">
                <div class="bum-text" id="bumText">I make TASes, other stuff<br>and I'm a potato</div>
            </div>
        </div>
        <div class="hint">Long press to flip • Tap to visit GitHub</div>
    </div>

    <script>
        const flipper = document.getElementById('flipper');
        const front = document.getElementById('front');
        const bumText = document.getElementById('bumText');
        let longPressTimer;
        let isLongPress = false;
        let isFlipped = false;
        const LONG_PRESS_DURATION = 500;

        document.addEventListener('contextmenu', (e) => e.preventDefault());

        function triggerSqueeze() {
            bumText.classList.remove('animate');
            void bumText.offsetWidth; // force reflow
            bumText.classList.add('animate');
        }

        function resetText() {
            bumText.classList.remove('animate');
        }

        function startLongPress(e) {
            if (e.type === 'mousedown' && e.button !== 0) return;
            
            isLongPress = false;
            longPressTimer = setTimeout(() => {
                isLongPress = true;
                isFlipped = !isFlipped;
                flipper.classList.toggle('flipped', isFlipped);
                if (isFlipped) {
                    setTimeout(triggerSqueeze, 400);
                } else {
                    resetText();
                }
                if (navigator.vibrate) navigator.vibrate(50);
            }, LONG_PRESS_DURATION);
        }

        function endLongPress(e) {
            clearTimeout(longPressTimer);
        }

        function handleClick(e) {
            if (isLongPress) {
                e.preventDefault();
                e.stopPropagation();
                return;
            }
            
            if (isFlipped) {
                e.preventDefault();
                isFlipped = false;
                flipper.classList.remove('flipped');
                resetText();
                setTimeout(() => {
                    window.open('https://github.com/demonrhino', '_blank');
                }, 300);
                return;
            }
            
            window.open('https://github.com/demonrhino', '_blank');
        }

        // Mouse events
        front.addEventListener('mousedown', startLongPress);
        front.addEventListener('mouseup', endLongPress);
        front.addEventListener('mouseleave', endLongPress);
        front.addEventListener('click', handleClick);

        // Touch events
        front.addEventListener('touchstart', (e) => {
            startLongPress(e);
        }, { passive: true });
        front.addEventListener('touchend', (e) => {
            endLongPress(e);
            if (!isLongPress && !isFlipped) {
                e.preventDefault();
                window.open('https://github.com/demonrhino', '_blank');
            } else if (isLongPress) {
                e.preventDefault();
            }
        });
        front.addEventListener('touchmove', endLongPress);
    </script>
</body>
</html>
